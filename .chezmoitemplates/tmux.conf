{{/*
  Shared tmux / psmux configuration.
  Included by:
    - dot_config/tmux/tmux.conf.tmpl  -> ~/.config/tmux/tmux.conf   (Linux/macOS tmux)
    - dot_psmux.conf.tmpl             -> ~/.psmux.conf               (Windows psmux)
  Edit THIS file; the two wrappers just pull it in.
  Syntax is tmux-compatible; psmux understands the same directives.
*/ -}}
# ---------------------------------------------------------------------------
# Managed by chezmoi. Do not edit the generated file directly.
# Source: .chezmoitemplates/tmux.conf   (run `chezmoi edit` on the target)
# ---------------------------------------------------------------------------

# NOTE: psmux parses the entire rest of the line as an option's value, so a
# trailing `# comment` after a value silently corrupts it. Keep comments on
# their own lines. (Real tmux tolerates trailing comments; psmux does not.)

# --- General ---------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
# keep window numbers gapless after closing one
set -g renumber-windows on
# snappier ESC in vim etc.
set -g escape-time 10
set -g focus-events on
# OSC 52 clipboard (works over SSH / most terminals)
set -g set-clipboard on
# status messages stay up long enough to read
set -g display-time 4000
# resize to the smallest client actually viewing the window, not the largest
setw -g aggressive-resize on
# don't let programs clobber window names you set by hand
set -g allow-rename off
set -g automatic-rename off
# let the terminal window/tab title track the tmux session
set -g set-titles on
{{ if ne .chezmoi.os "windows" -}}
# keep the server alive when the last session in a group is destroyed
set -g detach-on-destroy off
{{- end }}

# Platform shell
{{ if eq .chezmoi.os "windows" -}}
# psmux: launch panes in Git Bash. Swap for pwsh if you prefer:
#   set -g default-shell "C:/Program Files/PowerShell/7/pwsh.exe"
set -g default-shell "C:/Program Files/Git/bin/bash.exe"
{{- end }}

# --- Prefix ----------------------------------------------------------------
# Default prefix C-b is kept (identical on both platforms). To use C-a instead,
# uncomment the three lines below:
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# --- Reload ----------------------------------------------------------------
{{ if eq .chezmoi.os "windows" -}}
bind r source-file ~/.psmux.conf \; display "config reloaded"
{{- else -}}
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"
{{- end }}

# --- Splits & panes --------------------------------------------------------
# Intuitive split keys that also open in the current pane's directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Prefix-free pane navigation (Alt+arrow) -- pane switching is the single most
# frequent action, so it shouldn't cost a prefix.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Windows ---------------------------------------------------------------
# Repeatable window cycling, and prefix+prefix to bounce to the last window.
bind -r C-p previous-window
bind -r C-n next-window
bind C-b last-window

# Resize panes (repeatable: hold prefix, tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) --------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
{{ if eq .chezmoi.os "windows" -}}
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
{{- else -}}
# Uses OSC 52 (set-clipboard on). For a native pipe on X11/Wayland, replace with
# one of: "xclip -selection clipboard" / "wl-copy" / "pbcopy" (macOS).
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
{{- end }}

# --- Status bar ------------------------------------------------------------
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=white"
set -g status-left "#[bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#{?client_prefix,#[reverse] PREFIX #[default] ,}%Y-%m-%d %H:%M "
setw -g window-status-current-style "bold,reverse"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
